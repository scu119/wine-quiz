<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PerBacco Wine Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header with Language Toggle -->
        <header>
            <div class="lang-toggle">
                <button id="lang-en" class="active" onclick="setLanguage('en')">ENG</button>
                <div class="divider">|</div>
                <button id="lang-ko" onclick="setLanguage('ko')">KOR</button>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <main id="content-area">
            <!-- Screens will be injected here by JS -->
        </main>

        <!-- Hidden Admin Trigger: double click bottom left corner -->
        <div class="admin-mode-trigger" ondblclick="toggleAdminMode()" title="Double click for admin mode"></div>
        <div id="admin-overlay" class="admin-overlay">
            Admin Mode<br>Scores: <span id="admin-scores">-</span>
        </div>
    </div>
    <script src="script.js?v=8"></script>
</body>
</html>
